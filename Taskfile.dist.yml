version: "3"

tasks:
  test:
    desc: Run the Go test suite
    cmds:
      - go test -cover ./...

  # Docs
  docs:dev:
    desc: Run the Mintlify docs dev server
    dir: docs
    cmds:
      - mint dev

  docs:check:
    desc: Check the docs for broken links
    dir: docs
    cmds:
      - mint broken-links

  # Automations with hrns
  hrns:commit:
    desc: Commit and push using hrns
    cmds:
      - go run . exec -message="Commit and push uncommited changes. Do not ask, just choose most futting one" -provider="OpenCode Go" -model=kimi-k2.6

  hrns:lint:
    desc: Run linter and analyze output
    cmds:
      - go run . exec -message="Run `golangci-lint run` command and decide what lint errors are worth to make. Only analyze, do not fix anything" -provider="OpenCode Go" -model=kimi-k2.6
